<!DOCTYPE html>
<html>
<head>
  <title>Food App</title>

  <style>
    body{
      font-family:Arial;
      background:#f5f5f5;
      text-align:center;
      padding:40px;
    }

    .box{
      background:white;
      padding:30px;
      width:300px;
      margin:auto;
      border-radius:10px;
      box-shadow:0 0 10px gray;
    }

    input{
      width:90%;
      padding:10px;
      margin:10px;
    }

    button{
      padding:10px 20px;
      background:orange;
      border:none;
      color:white;
      cursor:pointer;
      border-radius:5px;
    }

    #msg{
      margin-top:20px;
      color:green;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Food Order</h2>

    <input type="text" id="name" placeholder="Enter food name">

    <button onclick="sendData()">
      Order Now
    </button>

    <div id="msg"></div>
  </div>

<script>

async function sendData(){

  let food = document.getElementById("name").value;

  let res = await fetch("http://localhost:5000/order",{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({
      food:food
    })

  });

  let data = await res.json();

  document.getElementById("msg").innerHTML =
  data.message;
}

</script>

</body>
</html>
